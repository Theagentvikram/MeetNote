services:
  - type: web
    name: meetnote-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: GROQ_API_KEY
        sync: false          # set manually in Render dashboard
      - key: PYTHON_VERSION
        value: 3.11.0
